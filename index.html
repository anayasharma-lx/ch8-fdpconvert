<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Fraction · Decimal · Percent — Ch. 8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f2ec;--paper:#fff;--sand:#e8e4db;--ink:#1a1714;--rule:#ccc8be;
  --blue:#1650a8;--blue-lt:#e8eef9;--green:#1e7d4a;--green-lt:#e5f3ec;
  --amber:#c47a0a;--amber-lt:#fef3d7;--red:#c13a2a;--red-lt:#fdecea;
  --display:'Archivo Black',Impact,sans-serif;
  --mono:'DM Mono',monospace;--body:'DM Sans',sans-serif;
}
html{background:var(--bg)}
body{font-family:var(--body);background:var(--bg);color:var(--ink);min-height:100vh;
  -webkit-font-smoothing:antialiased;padding:0}

/* ── HERO ── */
.hero{padding:22px 28px 18px;border-bottom:2.5px solid var(--ink);
  display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px}
.hero-tag{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.14em;
  text-transform:uppercase;color:var(--ink);opacity:.4;margin-bottom:6px}
.hero-title{font-family:var(--display);font-size:clamp(26px,6vw,52px);line-height:.92;color:var(--ink)}
.hero-title .dot{color:var(--rule);margin:0 6px}

/* ── THREE CARDS ── */
.trio{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:2px solid var(--ink)}
.trio-cell{padding:18px 22px;border-right:1px solid var(--rule);cursor:default}
.trio-cell:last-child{border-right:none}
.tc-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;margin-bottom:8px}
.tc-label.blue{color:var(--blue)}
.tc-label.green{color:var(--green)}
.tc-label.amber{color:var(--amber)}
.tc-big{font-family:var(--display);font-size:clamp(28px,5vw,46px);line-height:1}
.tc-big.blue{color:var(--blue)}
.tc-big.green{color:var(--green)}
.tc-big.amber{color:var(--amber)}
/* Fraction display — stacked */
.frac-stack{display:inline-flex;flex-direction:column;align-items:center;gap:0;line-height:1}
.frac-num{font-family:var(--display);font-size:clamp(20px,4vw,36px);color:var(--blue);
  border-bottom:3px solid var(--blue);padding-bottom:2px;min-width:32px;text-align:center;line-height:1.1}
.frac-den{font-family:var(--display);font-size:clamp(20px,4vw,36px);color:var(--blue);
  min-width:32px;text-align:center;padding-top:2px;line-height:1.1}
.tc-sub{font-family:var(--mono);font-size:11px;margin-top:6px;line-height:1.5}
.tc-sub.blue{color:var(--blue);opacity:.6}
.tc-sub.green{color:var(--green);opacity:.6}
.tc-sub.amber{color:var(--amber);opacity:.6}
@media(max-width:480px){.trio{grid-template-columns:1fr}
  .trio-cell{border-right:none;border-bottom:1px solid var(--rule)}
  .trio-cell:last-child{border-bottom:none}}

/* ── BAR MODEL ── */
.bar-section{padding:20px 28px;border-bottom:1px solid var(--rule)}
.bar-wrap{position:relative;height:52px;background:var(--sand);border:2px solid var(--ink);
  cursor:pointer;overflow:hidden;touch-action:none;margin-bottom:8px}
.bar-fill{height:100%;display:flex;align-items:center;padding-left:10px;transition:width .08s}
.bar-text{font-family:var(--display);font-size:20px;color:#fff;white-space:nowrap;letter-spacing:.02em}
.bar-overflow{position:absolute;top:0;right:0;height:100%;background:var(--red);
  display:flex;align-items:center;padding:0 10px;font-family:var(--display);font-size:16px;color:#fff}
.bar-scale{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--ink);opacity:.4}

/* ── AREA MODEL ── */
.area-section{padding:20px 28px;border-bottom:1px solid var(--rule)}
.area-head{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:var(--ink);opacity:.4;margin-bottom:14px}
.area-wrap{overflow-x:auto}

/* ── PRESETS ── */
.presets-section{padding:14px 28px;border-bottom:1px solid var(--rule);background:var(--paper);
  display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.ps-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase;color:var(--ink);opacity:.4;margin-right:4px;flex-shrink:0}
.ps-btn{padding:5px 12px;border:1.5px solid var(--rule);background:transparent;
  font-family:var(--mono);font-size:11px;font-weight:600;color:var(--ink);opacity:.6;cursor:pointer;transition:all .12s}
.ps-btn:hover{border-color:var(--ink);opacity:1}
.ps-btn.active{background:var(--ink);color:var(--bg);border-color:var(--ink);opacity:1}
/* Improper fractions get a warm tint when active */
.ps-btn.improper.active{background:var(--amber);border-color:var(--amber)}

/* ── CUSTOM INPUT ── */
.input-section{padding:18px 28px;border-bottom:1px solid var(--rule);background:var(--sand);
  display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.inp-group{display:flex;flex-direction:column;gap:5px}
.inp-label{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.1em;
  text-transform:uppercase}
.inp-label.blue{color:var(--blue)}
input[type=number]{padding:10px 12px;border:2px solid var(--rule);background:var(--paper);
  font-family:var(--display);font-size:26px;color:var(--ink);outline:none;
  width:90px;text-align:center;transition:border .12s;-moz-appearance:textfield}
input[type=number]:focus{border-color:var(--blue)}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
.div-sym{font-family:var(--display);font-size:28px;color:var(--rule);align-self:flex-end;padding-bottom:10px}
.go-btn{padding:10px 20px;background:var(--ink);border:2px solid var(--ink);
  font-family:var(--display);font-size:18px;letter-spacing:.04em;color:var(--bg);
  cursor:pointer;align-self:flex-end;transition:opacity .12s}
.go-btn:hover{opacity:.8}

/* ── EQUIVALENTS STRIP ── */
.equiv-section{padding:16px 28px;background:var(--ink);
  font-family:var(--mono);font-size:13px;color:var(--bg);line-height:1.8;
  border-bottom:1px solid var(--rule)}
.equiv-section .hl-blue{color:#9bbff0;font-weight:600}
.equiv-section .hl-green{color:#7de0a8;font-weight:600}
.equiv-section .hl-amber{color:#f7c96a;font-weight:600}

/* ── INSIGHT ── */
.insight-section{padding:20px 28px;display:flex;gap:14px}
.ins-bar{width:4px;background:var(--blue);flex-shrink:0}
.ins-bar.improper{background:var(--amber)}
.ins-text{font-size:14px;line-height:1.75;color:var(--ink);opacity:.7}
.ins-text strong{opacity:1;color:var(--ink)}
</style>
</head>
<body>

<div class="hero">
  <div>
    <div class="hero-tag">Ch. 8 · Percentage & Interest</div>
    <div class="hero-title">Fraction<span class="dot">·</span>Decimal<span class="dot">·</span>Percent</div>
  </div>
</div>

<div class="trio" id="trio">
  <div class="trio-cell">
    <div class="tc-label blue">Fraction</div>
    <div class="frac-stack">
      <div class="frac-num" id="d-num">3</div>
      <div class="frac-den" id="d-den">4</div>
    </div>
    <div class="tc-sub blue" id="d-frac-sub">= 75/100</div>
  </div>
  <div class="trio-cell">
    <div class="tc-label green">Decimal</div>
    <div class="tc-big green" id="d-dec">0.75</div>
    <div class="tc-sub green" id="d-dec-sub">= 75 hundredths</div>
  </div>
  <div class="trio-cell">
    <div class="tc-label amber">Percent</div>
    <div class="tc-big amber" id="d-pct">75%</div>
    <div class="tc-sub amber" id="d-pct-sub">= 75 out of 100</div>
  </div>
</div>

<div class="bar-section">
  <div class="bar-wrap" id="bar-wrap">
    <div class="bar-fill" id="bar-fill">
      <span class="bar-text" id="bar-text">75%</span>
    </div>
    <div class="bar-overflow" id="bar-overflow" style="display:none"></div>
  </div>
  <div class="bar-scale">
    <span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>
  </div>
</div>

<div class="area-section">
  <div class="area-head" id="area-head">Area model — each whole rectangle = 1</div>
  <div class="area-wrap" id="area-wrap"></div>
</div>

<div class="presets-section">
  <span class="ps-label">Try</span>
  <button class="ps-btn" data-n="1" data-d="2">½</button>
  <button class="ps-btn" data-n="1" data-d="4">¼</button>
  <button class="ps-btn active" data-n="3" data-d="4">¾</button>
  <button class="ps-btn" data-n="1" data-d="5">1/5</button>
  <button class="ps-btn" data-n="3" data-d="5">3/5</button>
  <button class="ps-btn" data-n="9" data-d="20">9/20</button>
  <button class="ps-btn" data-n="1" data-d="3">1/3</button>
  <button class="ps-btn" data-n="7" data-d="14">7/14</button>
  <button class="ps-btn" data-n="5" data-d="11">5/11</button>
  <button class="ps-btn improper" data-n="5" data-d="4">5/4</button>
  <button class="ps-btn improper" data-n="7" data-d="3">7/3</button>
  <button class="ps-btn improper" data-n="11" data-d="4">11/4</button>
  <button class="ps-btn improper" data-n="8" data-d="3">8/3</button>
</div>

<div class="input-section">
  <div class="inp-group">
    <div class="inp-label blue">Numerator</div>
    <input type="number" id="inp-num" value="3" min="0">
  </div>
  <div class="div-sym">÷</div>
  <div class="inp-group">
    <div class="inp-label blue">Denominator</div>
    <input type="number" id="inp-den" value="4" min="1">
  </div>
  <button class="go-btn" id="go-btn">Convert</button>
</div>

<div class="equiv-section" id="equiv-section"></div>

<div class="insight-section" id="insight-section"></div>

<script>
let N=3,D=4;

function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){const t=b;b=a%b;a=t;}return a||1;}

function buildAreaModel(n,d){
  // Represent n/d as filled rectangles.
  // If n < d: one rectangle, partially filled. n cells filled out of d.
  // If n >= d: show floor(n/d) complete rectangles + one partial for remainder.
  // Each rectangle = d cells wide, 1 cell tall (visually: 1 whole unit).
  // Cell size: fit d cells across ~560px, max cell ~48px, min ~16px.
  const wholes=Math.floor(n/d);
  const rem=n%d;
  const totalRects=wholes+(rem>0?1:0);
  if(totalRects===0) return '<div style="font-family:var(--mono);font-size:13px;opacity:.5">Fraction is 0 — nothing to show</div>';

  const containerW=Math.min(560,window.innerWidth-80);
  const cellW=Math.max(16,Math.min(48,Math.floor(containerW/d)));
  const cellH=Math.max(20,Math.min(40,cellW));
  const rectW=cellW*d;
  const GAP=6;
  const totalW=rectW+2; // +2 for border

  let rects='';
  for(let r=0;r<totalRects;r++){
    const isWhole=r<wholes;
    const filled=isWhole?d:rem;
    let cells='';
    for(let c=0;c<d;c++){
      const isFilled=c<filled;
      cells+=`<div style="width:${cellW}px;height:${cellH}px;background:${isFilled?'var(--blue)':'var(--sand)'};
        border:1px solid ${isFilled?'#0d3a7a':'var(--rule)'};flex-shrink:0;
        ${isFilled&&c===filled-1?'border-right:2px solid #0d3a7a':''};
        transition:background .15s"></div>`;
    }
    const label=isWhole?'1 whole':`${rem}/${d}`;
    rects+=`<div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
      <div style="display:flex;border:2px solid var(--ink);overflow:hidden;width:${rectW}px">${cells}</div>
      <div style="font-family:var(--mono);font-size:10px;color:var(--ink);opacity:.45;text-align:center;width:${rectW}px">${label}</div>
    </div>`;
  }

  const totalW2=totalRects*(rectW+GAP+16);
  return `<div style="display:flex;gap:${GAP}px;flex-wrap:wrap;align-items:flex-end">${rects}</div>`;
}

function update(){
  if(D===0||isNaN(N)||isNaN(D)) return;
  const val=N/D;
  const pct=val*100;
  const isImproper=N>D&&D>0;

  // Decimal — show up to 6 sig figs, strip trailing zeros
  const decRaw=Math.round(val*1000000)/1000000;
  const decStr=decRaw%1===0?decRaw.toString():decRaw.toFixed(Math.min(6,(decRaw.toString().split('.')[1]||'').length));

  // Percent string
  const pctStr=pct%1===0?pct.toFixed(0):(pct).toFixed(pct<10?4:2);

  // Trio
  document.getElementById('d-num').textContent=N;
  document.getElementById('d-den').textContent=D;
  const g=gcd(N,D);
  const sN=N/g,sD=D/g;
  document.getElementById('d-frac-sub').textContent=
    sN===N&&sD===D?`(already simplest)`:`= ${sN}/${sD} simplified`;
  document.getElementById('d-dec').textContent=decStr;
  document.getElementById('d-dec-sub').textContent=
    isImproper?`greater than 1 whole`:`= ${decStr} of 1 whole`;
  document.getElementById('d-pct').textContent=pctStr+'%';
  document.getElementById('d-pct-sub').textContent=
    isImproper?`more than 100% — improper fraction`:`= ${pctStr} out of 100`;

  // Bar
  const pctClamped=Math.min(100,Math.max(0,pct));
  const fill=document.getElementById('bar-fill');
  fill.style.width=pctClamped+'%';
  fill.style.background=isImproper?'var(--blue)':pct>66?'var(--blue)':pct>33?'var(--green)':'var(--amber)';
  document.getElementById('bar-text').textContent=pctStr+'%';
  const overflow=document.getElementById('bar-overflow');
  if(isImproper){
    overflow.style.display='flex';
    overflow.textContent=`+${(pct-100).toFixed(pct<200?1:0)}% over`;
  } else {
    overflow.style.display='none';
  }

  // Area model
  document.getElementById('area-head').textContent=
    isImproper?
    `Area model — ${N}/${D} = ${sN}/${sD} = ${wholeCount(N,D)} whole${wholeCount(N,D)===1?'':'s'} and ${N%D}/${D}`:
    `Area model — each rectangle = 1 whole (${D} equal parts)`;
  document.getElementById('area-wrap').innerHTML=buildAreaModel(N,D);

  // Presets highlight
  document.querySelectorAll('.ps-btn').forEach(b=>{
    b.classList.toggle('active',+b.dataset.n===N&&+b.dataset.d===D);
  });

  // Equivalents
  // Step: n/d → multiply to get /100 if d is a factor of 100, else just show decimal method
  const mult=Math.round(100/D);
  const equiv=document.getElementById('equiv-section');
  let convStr;
  if(100%D===0){
    convStr=`<span class="hl-blue">${N}/${D}</span> = <span class="hl-blue">${N}×${mult} / ${D}×${mult}</span> = <span class="hl-green">${N*mult}/100</span> = <span class="hl-green">${decStr}</span> = <span class="hl-amber">${pctStr}%</span>`;
  } else {
    convStr=`<span class="hl-blue">${N}/${D}</span> ÷ — can't make /100 exactly, so divide: ${N}÷${D} = <span class="hl-green">${decStr}</span> → ×100 = <span class="hl-amber">${pctStr}%</span>`;
  }
  equiv.innerHTML=convStr+(isImproper?`&nbsp;&nbsp;—&nbsp;&nbsp;improper: <span class="hl-amber">${Math.floor(N/D)}</span> whole${Math.floor(N/D)===1?'':'s'} and <span class="hl-amber">${N%D}/${D}</span> remaining`:'');

  // Insight
  const ins=document.getElementById('insight-section');
  if(isImproper){
    ins.innerHTML=`<div class="ins-bar improper"></div>
      <p class="ins-text"><strong>${N}/${D} is an improper fraction</strong> — the numerator is larger than the denominator, so the value is greater than 1. It equals <strong>${Math.floor(N/D)} whole${Math.floor(N/D)===1?'':'s'} and ${N%D}/${D}</strong>. As a decimal it's ${decStr}, and as a percentage it's <strong>${pctStr}%</strong> — more than 100%. This comes up in real life when measuring growth (a company grew to 150% of last year's size) or in mixed number problems.</p>`;
  } else {
    ins.innerHTML=`<div class="ins-bar"></div>
      <p class="ins-text"><strong>${N}/${D}</strong> means "${N} equal parts out of ${D}." Percent literally means "per hundred" — to convert, find how many parts out of 100 you'd have. ${100%D===0?`Since 100 ÷ ${D} = ${Math.round(100/D)}, multiply both top and bottom by ${Math.round(100/D)}: ${N}×${Math.round(100/D)} = <strong>${N*Math.round(100/D)}</strong> out of 100 = <strong>${pctStr}%</strong>.`:`Since ${D} doesn't divide evenly into 100, divide instead: ${N} ÷ ${D} = <strong>${decStr}</strong>, then multiply by 100 to get <strong>${pctStr}%</strong>.`}</p>`;
  }
}

function wholeCount(n,d){return Math.floor(n/d);}

// Bar drag — snaps to nice fractions
const barWrap=document.getElementById('bar-wrap');
let dragging=false;
function setFromX(ex){
  const rect=barWrap.getBoundingClientRect();
  const pct=Math.max(0,Math.min(200,(ex-rect.left)/rect.width*100));
  const val=pct/100;
  // Find closest fraction with denom 2..20
  let bN=1,bD=2,bDiff=Infinity;
  for(let d=2;d<=20;d++){
    const n=Math.round(val*d);
    if(n<0||n>d*2) continue;
    const diff=Math.abs(n/d-val);
    if(diff<bDiff){bDiff=diff;bN=n;bD=d;}
  }
  N=bN;D=bD;
  document.getElementById('inp-num').value=N;
  document.getElementById('inp-den').value=D;
  update();
}
barWrap.addEventListener('mousedown',e=>{dragging=true;setFromX(e.clientX);});
document.addEventListener('mousemove',e=>{if(dragging)setFromX(e.clientX);});
document.addEventListener('mouseup',()=>dragging=false);
barWrap.addEventListener('touchstart',e=>{e.preventDefault();dragging=true;setFromX(e.touches[0].clientX);},{passive:false});
barWrap.addEventListener('touchmove',e=>{e.preventDefault();setFromX(e.touches[0].clientX);},{passive:false});
document.addEventListener('touchend',()=>dragging=false);

// Presets
document.querySelectorAll('.ps-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    N=+b.dataset.n;D=+b.dataset.d;
    document.getElementById('inp-num').value=N;
    document.getElementById('inp-den').value=D;
    update();
  });
});

// Custom input
document.getElementById('go-btn').addEventListener('click',()=>{
  N=Math.max(0,+document.getElementById('inp-num').value||0);
  D=Math.max(1,+document.getElementById('inp-den').value||1);
  update();
});
['inp-num','inp-den'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown',e=>{
    if(e.key==='Enter') document.getElementById('go-btn').click();
  });
});

update();
</script>
</body>
</html>
